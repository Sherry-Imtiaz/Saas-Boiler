openapi: 3.0.3
info:
  title: SaaS Boilerplate API
  version: 0.6.0
  description: Organisation-first SaaS boilerplate API. v0.6.0 adds RBAC, protected
    internal APIs, role management and permission catalogue endpoints. Every API is
    documented with Internal or External tags and explicit authentication requirements.
servers:
- url: http://localhost:4000/api
  description: Local development API
tags:
- name: External
  description: APIs intended for application clients or external consumers. Authentication
    requirements are shown per endpoint.
- name: Internal
  description: APIs intended for platform/admin/internal use. These usually require
    authentication and elevated permissions once auth is introduced.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer user session token returned by POST /auth/login. Required
        for protected internal endpoints from v0.6.0 onward. Future token types will
        include personal access tokens and organisation API tokens.
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            message:
              type: string
              example: Route not found
            details:
              type: object
            stack:
              type: string
    HealthResponse:
      type: object
      required:
      - success
      - service
      - version
      - status
      - database
      - timestamp
      properties:
        success:
          type: boolean
          example: true
        service:
          type: string
          example: saas-boilerplate-api
        version:
          type: string
          example: 0.6.0
        status:
          type: string
          example: ok
        database:
          type: object
          properties:
            mongo_ready_state:
              type: number
              description: Mongoose connection ready state. 1 means connected.
        timestamp:
          type: string
          format: date-time
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1
        total_pages:
          type: integer
          example: 1
    OrganisationDomain:
      type: object
      required:
      - domain
      properties:
        domain:
          type: string
          example: example.com
        verified:
          type: boolean
          example: false
        is_primary:
          type: boolean
          example: true
    OrganisationPlan:
      type: object
      properties:
        plan_id:
          type: string
          nullable: true
          example: foundation
        name:
          type: string
          nullable: true
          example: Foundation
        billing_status:
          type: string
          nullable: true
          example: not_configured
    OrganisationBranding:
      type: object
      properties:
        logo_url:
          type: string
          nullable: true
          example: null
        primary_colour:
          type: string
          nullable: true
          example: '#1A73E8'
        secondary_colour:
          type: string
          nullable: true
          example: '#111827'
        login_title:
          type: string
          nullable: true
          example: Welcome to Example Organisation
        login_subtitle:
          type: string
          nullable: true
          example: Sign in to continue
        login_background_url:
          type: string
          nullable: true
          example: null
        support_email:
          type: string
          nullable: true
          example: support@example.com
    OrganisationStorage:
      type: object
      properties:
        storage_provider:
          type: string
          nullable: true
          example: null
        storage_prefix:
          type: string
          nullable: true
          example: organisations/example-organisation/
        max_storage_gb:
          type: number
          nullable: true
          example: 20
    Organisation:
      type: object
      properties:
        id:
          type: string
          example: '665000000000000000000001'
        _id:
          type: string
          example: '665000000000000000000001'
        name:
          type: string
          example: Example Organisation
        slug:
          type: string
          example: example-organisation
        status:
          type: string
          enum:
          - active
          - inactive
          - suspended
          example: active
        plan:
          $ref: '#/components/schemas/OrganisationPlan'
        branding:
          $ref: '#/components/schemas/OrganisationBranding'
        domains:
          type: array
          items:
            $ref: '#/components/schemas/OrganisationDomain'
        auth_config:
          type: object
          description: Organisation auth configuration placeholder. Full SSO support
            is planned for later versions.
        features:
          type: object
          additionalProperties:
            type: boolean
          example:
            dashboard: true
            file_uploads: false
        compute_allocation:
          type: object
          description: Future compute allocation placeholder.
        storage:
          $ref: '#/components/schemas/OrganisationStorage'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateOrganisationRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          example: Example Organisation
        slug:
          type: string
          example: example-organisation
        status:
          type: string
          enum:
          - active
          - inactive
          - suspended
          default: active
        plan:
          $ref: '#/components/schemas/OrganisationPlan'
        branding:
          $ref: '#/components/schemas/OrganisationBranding'
        domains:
          type: array
          items:
            $ref: '#/components/schemas/OrganisationDomain'
        features:
          type: object
          additionalProperties:
            type: boolean
        storage:
          $ref: '#/components/schemas/OrganisationStorage'
    UpdateOrganisationRequest:
      type: object
      properties:
        name:
          type: string
          example: Updated Organisation
        slug:
          type: string
          example: updated-organisation
        plan:
          $ref: '#/components/schemas/OrganisationPlan'
        branding:
          $ref: '#/components/schemas/OrganisationBranding'
        domains:
          type: array
          items:
            $ref: '#/components/schemas/OrganisationDomain'
        features:
          type: object
          additionalProperties:
            type: boolean
        storage:
          $ref: '#/components/schemas/OrganisationStorage'
    UpdateOrganisationStatusRequest:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - active
          - inactive
          - suspended
          example: active
    OrganisationResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Organisation created successfully.
        data:
          $ref: '#/components/schemas/Organisation'
    OrganisationListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Organisation'
        pagination:
          $ref: '#/components/schemas/Pagination'
    UserProfile:
      type: object
      properties:
        avatar_url:
          type: string
          nullable: true
          example: null
        phone:
          type: string
          nullable: true
          example: +61 400 000 000
        timezone:
          type: string
          nullable: true
          example: Australia/Melbourne
    UserAuth:
      type: object
      properties:
        auth_type:
          type: string
          enum:
          - native
          - oidc
          - saml
          example: native
        mfa_enabled:
          type: boolean
          example: false
        last_login_at:
          type: string
          format: date-time
          nullable: true
    User:
      type: object
      properties:
        id:
          type: string
          example: '665000000000000000000101'
        _id:
          type: string
          example: '665000000000000000000101'
        organisation_id:
          type: string
          example: '665000000000000000000001'
        email:
          type: string
          example: user@example.com
        email_normalised:
          type: string
          example: user@example.com
        first_name:
          type: string
          nullable: true
          example: Demo
        last_name:
          type: string
          nullable: true
          example: User
        display_name:
          type: string
          example: Demo User
        status:
          type: string
          enum:
          - invited
          - active
          - disabled
          example: invited
        auth:
          $ref: '#/components/schemas/UserAuth'
        role_ids:
          type: array
          items:
            type: string
          example:
          - '665000000000000000000201'
        profile:
          $ref: '#/components/schemas/UserProfile'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateUserRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
          example: new.user@example.com
        first_name:
          type: string
          nullable: true
          example: New
        last_name:
          type: string
          nullable: true
          example: User
        display_name:
          type: string
          example: New User
        status:
          type: string
          enum:
          - invited
          - active
          - disabled
          default: invited
        auth_type:
          type: string
          enum:
          - native
          - oidc
          - saml
          default: native
        role_ids:
          type: array
          items:
            type: string
        profile:
          $ref: '#/components/schemas/UserProfile'
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 200
          description: Optional native-login password. Required for the user to log
            in with native authentication. Not returned by any API.
          example: ChangeMe123!
    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: updated.user@example.com
        first_name:
          type: string
          nullable: true
          example: Updated
        last_name:
          type: string
          nullable: true
          example: User
        display_name:
          type: string
          example: Updated User
        auth_type:
          type: string
          enum:
          - native
          - oidc
          - saml
        role_ids:
          type: array
          items:
            type: string
        profile:
          $ref: '#/components/schemas/UserProfile'
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 200
          description: Optional native-login password. Required for the user to log
            in with native authentication. Not returned by any API.
          example: ChangeMe123!
    UpdateUserStatusRequest:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - invited
          - active
          - disabled
          example: disabled
    UserResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: User created successfully under organisation.
        data:
          $ref: '#/components/schemas/User'
    UserListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        pagination:
          $ref: '#/components/schemas/Pagination'
    SchemaStatusResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        version:
          type: string
          example: 0.6.0
        message:
          type: string
          example: MongoDB schema foundation is loaded and protected by RBAC.
        tenant_model:
          type: string
        authentication:
          type: object
        collection_status:
          type: array
          items:
            type: object
        timestamp:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          example: admin@example.com
        password:
          type: string
          format: password
          example: ChangeMe123!
    AuthOrganisation:
      type: object
      properties:
        id:
          type: string
          example: 64f000000000000000000001
        name:
          type: string
          example: Demo Organisation
        slug:
          type: string
          example: demo-organisation
        status:
          type: string
          example: active
        branding:
          $ref: '#/components/schemas/OrganisationBranding'
        features:
          type: object
          additionalProperties:
            type: boolean
    AuthRoleSummary:
      type: object
      properties:
        id:
          type: string
          example: 64f000000000000000000010
        name:
          type: string
          example: Organisation Admin
        is_system_role:
          type: boolean
          example: true
        permission_keys:
          type: array
          items:
            type: string
          example:
          - organisation.view
          - users.view
    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Login successful.
        data:
          type: object
          properties:
            token_type:
              type: string
              example: Bearer
            access_token:
              type: string
              description: JWT-style bearer token for authenticated API calls.
            expires_in:
              type: integer
              example: 3600
            user:
              $ref: '#/components/schemas/User'
            organisation:
              $ref: '#/components/schemas/AuthOrganisation'
            roles:
              type: array
              items:
                $ref: '#/components/schemas/AuthRoleSummary'
            permission_keys:
              type: array
              items:
                type: string
              example:
              - organisation.view
              - users.view
    AuthMeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            organisation:
              $ref: '#/components/schemas/AuthOrganisation'
            roles:
              type: array
              items:
                $ref: '#/components/schemas/AuthRoleSummary'
            permission_keys:
              type: array
              items:
                type: string
    LogoutResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Logout acknowledged. Remove the bearer token from the client.
    Permission:
      type: object
      properties:
        id:
          type: string
          example: '665000000000000000000010'
        key:
          type: string
          example: roles.manage
        module:
          type: string
          example: roles
        action:
          type: string
          example: manage
        description:
          type: string
          nullable: true
          example: Create and update organisation roles
        is_active:
          type: boolean
          example: true
    Role:
      type: object
      properties:
        id:
          type: string
          example: '665000000000000000000020'
        _id:
          type: string
          example: '665000000000000000000020'
        organisation_id:
          type: string
          example: '665000000000000000000001'
        name:
          type: string
          example: Organisation Admin
        description:
          type: string
          nullable: true
          example: Default administrator role for the organisation
        is_system_role:
          type: boolean
          example: true
        permission_keys:
          type: array
          items:
            type: string
          example:
          - organisation.view
          - users.view
          - roles.manage
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateRoleRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          example: Support Agent
        description:
          type: string
          nullable: true
          example: Can view users and files
        permission_keys:
          type: array
          items:
            type: string
          example:
          - organisation.view
          - users.view
          - files.view
    UpdateRoleRequest:
      type: object
      properties:
        name:
          type: string
          example: Senior Support Agent
        description:
          type: string
          nullable: true
          example: Can view and manage selected organisation data
        permission_keys:
          type: array
          items:
            type: string
          example:
          - organisation.view
          - users.view
          - roles.view
          - files.view
paths:
  /health:
    get:
      tags:
      - External
      summary: Health check
      description: 'External health check. Authentication: none.'
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /auth/login:
    post:
      tags:
      - External
      summary: Native login
      description: 'Authenticates an active native user with email and password. Authentication:
        none. Returns a bearer token that carries user_id, organisation_id, email
        and role_ids.'
      operationId: loginNativeUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid email or password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User or organisation is not active.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/me:
    get:
      tags:
      - External
      summary: Current authenticated user context
      description: 'Returns the authenticated user, organisation, role summaries and
        flattened permission keys. Authentication: Bearer user session token required.
        Required permission/scope: authenticated user token.'
      operationId: getCurrentUserContext
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Current user context returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          description: Authentication required or token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated user lacks required permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
      - External
      summary: Logout current bearer token session
      description: 'Acknowledges logout for stateless bearer-token authentication
        and records an audit event. Authentication: Bearer user session token required.
        Required permission/scope: authenticated user token.'
      operationId: logoutCurrentUser
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Logout acknowledged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
        '401':
          description: Authentication required or token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated user lacks required permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /internal/schema/status:
    get:
      tags:
      - Internal
      summary: MongoDB schema status
      description: 'Internal schema diagnostic endpoint. Authentication: Bearer user
        session token required. Required permission/scope: internal.schema.view.'
      operationId: getSchemaStatus
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaStatusResponse'
        '401':
          description: Authentication required or token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated user lacks required permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /platform/organisations:
    post:
      tags:
      - Internal
      summary: Create organisation
      description: 'Creates a new organisation tenant. Authentication: Bearer user
        session token required. Required permission/scope: platform.organisations.manage.'
      operationId: createOrganisation
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganisationRequest'
      responses:
        '201':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganisationResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Organisation slug conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required or token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated user lacks required permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
      - Internal
      summary: List organisations
      description: 'Lists organisations with pagination, status filter and search.
        Authentication: Bearer user session token required. Required permission/scope:
        platform.organisations.view.'
      operationId: listOrganisations
      security:
      - BearerAuth: []
      parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
      - name: status
        in: query
        schema:
          type: string
          enum:
          - active
          - inactive
          - suspended
      - name: search
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganisationListResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required or token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated user lacks required permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /platform/organisations/{id}:
    get:
      tags:
      - Internal
      summary: Get organisation
      description: 'Returns one organisation by id. Authentication: Bearer user session
        token required. Required permission/scope: platform.organisations.view.'
      operationId: getOrganisationById
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganisationResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Organisation not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required or token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated user lacks required permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
      - Internal
      summary: Update organisation
      description: 'Updates organisation profile/configuration fields. Authentication:
        Bearer user session token required. Required permission/scope: platform.organisations.manage.'
      operationId: updateOrganisation
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganisationRequest'
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganisationResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Organisation not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Organisation slug conflict.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required or token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Authenticated user lacks required permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /platform/organisations/{id}/status:
    patch:
      tags:
      - Internal
      summary: Update organisation status
      description: 'Updates organisation status. Authentication: Bearer user session
        token required. Required permission/scope: platform.organisations.manage.'
      operationId: updateOrganisationStatus
      security:
      - BearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
